<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Country Pulse</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d10;
      --panel: #141820;
      --panel-soft: #10141b;
      --ink: #f4f0e8;
      --muted: #a8b0bd;
      --quiet: #788291;
      --line: rgba(255, 255, 255, 0.12);
      --accent: #d96b5f;
      --accent-2: #56b6a5;
      --radius: 8px;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 260px),
        radial-gradient(circle at top left, rgba(217, 107, 95, 0.09), transparent 310px),
        radial-gradient(circle at top right, rgba(86, 182, 165, 0.08), transparent 320px),
        var(--bg);
      color: var(--ink);
      font-family: var(--font);
      line-height: 1.5;
      margin: 0;
      min-height: 100vh;
    }

    button {
      font: inherit;
    }

    .shell {
      margin: 0 auto;
      max-width: 1120px;
      padding: 34px 20px 54px;
    }

    header {
      display: grid;
      gap: 10px;
      margin: 0 auto 34px;
      max-width: 740px;
      text-align: center;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.7rem);
      font-weight: 760;
      letter-spacing: 0;
      line-height: 1.04;
    }

    header p {
      color: var(--muted);
      font-size: 1.04rem;
    }

    .method-line {
      color: var(--quiet);
      font-size: 0.92rem;
      margin-top: 6px;
    }

    .question-panel {
      background: rgba(20, 24, 32, 0.9);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: grid;
      gap: 22px;
      margin: 0 auto 20px;
      max-width: 860px;
      padding: clamp(18px, 3vw, 30px);
    }

    .control-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .control {
      display: grid;
      gap: 8px;
    }

    .label {
      color: var(--quiet);
      font-size: 0.78rem;
      font-weight: 760;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .segmented {
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 4px;
    }

    .segmented button {
      background: transparent;
      border: 0;
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      flex: 1 1 auto;
      font-size: 0.9rem;
      min-width: max-content;
      padding: 9px 12px;
    }

    .segmented button[aria-pressed="true"] {
      background: var(--ink);
      color: var(--bg);
    }

    .answer {
      border-top: 1px solid var(--line);
      display: grid;
      gap: 12px;
      padding-top: 22px;
    }

    .answer h2 {
      font-size: clamp(1.55rem, 3vw, 2.4rem);
      font-weight: 720;
      letter-spacing: 0;
      line-height: 1.1;
    }

    .answer p {
      color: #d5dae1;
      font-size: 1.04rem;
      max-width: 760px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      display: inline-flex;
      font-size: 0.82rem;
      padding: 6px 10px;
    }

    .insights {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin: 22px auto 0;
      max-width: 1040px;
    }

    .card {
      background: rgba(20, 24, 32, 0.76);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      display: grid;
      gap: 12px;
      min-height: 245px;
      padding: 18px;
    }

    .card h3 {
      font-size: 1.04rem;
      font-weight: 720;
      line-height: 1.25;
    }

    .card p {
      color: var(--muted);
      font-size: 0.94rem;
    }

    .evidence {
      display: grid;
      gap: 8px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .evidence li {
      color: #d8dde5;
      font-size: 0.9rem;
      padding-left: 14px;
      position: relative;
    }

    .evidence li::before {
      background: var(--accent);
      border-radius: 999px;
      content: "";
      height: 5px;
      left: 0;
      position: absolute;
      top: 0.62em;
      width: 5px;
    }

    details {
      background: rgba(16, 20, 27, 0.82);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      margin: 24px auto 0;
      max-width: 1040px;
      padding: 16px 18px;
    }

    summary {
      color: var(--ink);
      cursor: pointer;
      font-weight: 720;
    }

    .method-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 16px;
    }

    .method-item {
      border-top: 1px solid var(--line);
      display: grid;
      gap: 5px;
      padding-top: 10px;
    }

    .method-item h3 {
      font-size: 0.95rem;
    }

    .method-item p {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .loading,
    .error {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      margin: 40px auto;
      max-width: 720px;
      padding: 18px;
      text-align: center;
    }

    @media (max-width: 820px) {
      .control-grid,
      .insights,
      .method-grid {
        grid-template-columns: 1fr;
      }

      .question-panel {
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <h1>Country Pulse</h1>
      <p>Compare public humanitarian indicators across countries and time.</p>
      <p class="method-line">Measured from public datasets and reporting APIs. Some values are unavailable where public sources do not provide comparable data.</p>
    </header>

    <div id="app" class="loading">Loading Country Pulse data...</div>
  </main>

  <script>
    const state = {
      countries: [],
      sourceGroups: [],
      controls: null,
      countryId: "sudan",
      compareWith: "previous30",
      theme: "combined",
      question: "what-changed"
    };

    const app = document.querySelector("#app");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function currentCountry() {
      return state.countries.find((country) => country.id === state.countryId) || state.countries[0];
    }

    function chooseInsight(country) {
      const exact = country.insights.find((insight) => insight.theme === state.theme && insight.question === state.question);
      if (exact) return exact;
      const themeMatch = country.insights.find((insight) => insight.theme === state.theme);
      if (themeMatch) return themeMatch;
      const questionMatch = country.insights.find((insight) => insight.question === state.question);
      return questionMatch || country.insights[0];
    }

    function relatedInsights(country, active) {
      return country.insights
        .filter((insight) => insight.id !== active.id)
        .slice(0, 4);
    }

    function segmented(label, key, options) {
      return `
        <div class="control">
          <div class="label">${escapeHtml(label)}</div>
          <div class="segmented" data-control="${escapeHtml(key)}">
            ${options.map((option) => `
              <button type="button" data-value="${escapeHtml(option.id)}" aria-pressed="${String(state[key] === option.id)}">${escapeHtml(option.label || option.name)}</button>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderAnswer(insight) {
      return `
        <section class="answer" aria-live="polite">
          <div class="label">Answer</div>
          <h2>${escapeHtml(insight.headline)}</h2>
          <p>${escapeHtml(insight.shortAnswer)}</p>
          <div class="meta-row">
            <span class="pill">${escapeHtml(insight.comparisonBasis)}</span>
            <span class="pill">${escapeHtml(insight.dateRange)}</span>
            <span class="pill">${escapeHtml(insight.confidenceLabel)}</span>
          </div>
        </section>
      `;
    }

    function renderCard(insight) {
      return `
        <article class="card">
          <span class="pill">${escapeHtml(insight.methodCategory)}</span>
          <h3>${escapeHtml(insight.headline)}</h3>
          <p>${escapeHtml(insight.shortAnswer)}</p>
          <ul class="evidence">
            ${insight.evidenceBullets.slice(0, 3).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
          </ul>
          <p>${escapeHtml(insight.caveat)}</p>
        </article>
      `;
    }

    function renderMethod(country) {
      const groups = state.sourceGroups.map((group) => {
        const countryGroup = country.sourceGroups.find((item) => item.id === group.id);
        const used = countryGroup?.usedInVisibleInsights ? "Used in visible insights." : "Kept in method only for this view.";
        return `
          <div class="method-item">
            <h3>${escapeHtml(group.label)}</h3>
            <p>${escapeHtml(group.contribution)}</p>
            <p>${escapeHtml(used)} ${escapeHtml(group.limitations)}</p>
          </div>
        `;
      }).join("");
      return `
        <details>
          <summary>View data and method</summary>
          <div class="method-grid">${groups}</div>
        </details>
      `;
    }

    function render() {
      const country = currentCountry();
      const active = chooseInsight(country);
      app.className = "";
      app.innerHTML = `
        <section class="question-panel">
          <div class="control-grid">
            ${segmented("Country", "countryId", state.controls.countries)}
            ${segmented("Compare with", "compareWith", state.controls.compareWith)}
            ${segmented("Theme", "theme", state.controls.themes)}
            ${segmented("Question", "question", state.controls.questions)}
          </div>
          ${renderAnswer(active)}
        </section>
        <section class="insights" aria-label="Supporting insights">
          ${relatedInsights(country, active).map(renderCard).join("")}
        </section>
        ${renderMethod(country)}
      `;
      bindControlClicks();
    }

    function bindControlClicks() {
      app.querySelectorAll("[data-control]").forEach((group) => {
        group.addEventListener("click", (event) => {
          const button = event.target.closest("button[data-value]");
          if (!button) return;
          const key = group.dataset.control;
          state[key] = button.dataset.value;
          render();
        });
      });
    }

    async function load() {
      try {
        const version = "country-pulse-1.0.1";
        const [countriesResponse, sourcesResponse] = await Promise.all([
          fetch(`data/countries.json?v=${version}`),
          fetch(`data/sources.json?v=${version}`)
        ]);
        if (!countriesResponse.ok || !sourcesResponse.ok) throw new Error("Could not load Country Pulse data.");
        const countriesData = await countriesResponse.json();
        const sourcesData = await sourcesResponse.json();
        state.countries = countriesData.countries;
        state.controls = countriesData.controls;
        state.sourceGroups = sourcesData.sourceGroups;
        render();
      } catch (error) {
        app.className = "error";
        app.textContent = "Country Pulse data could not be loaded.";
        console.error(error);
      }
    }

    load();
  </script>
</body>
</html>
